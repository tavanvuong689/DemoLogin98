<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Vương Đi Lạc</title>
    <link rel="stylesheet" href="style.css">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<div class="waves">
    <svg viewBox="0 0 1440 130" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none" style="width:100%">
        <path class="wave-3" fill="rgba(108,61,232,0.13)" d="M0,80 C360,120 720,40 1080,80 C1260,100 1360,70 1440,80 L1440,130 L0,130 Z"/>
        <path class="wave-2" fill="rgba(79,110,247,0.10)" d="M0,100 C400,60 800,130 1200,90 C1320,75 1390,100 1440,90 L1440,130 L0,130 Z"/>
        <path class="wave-1" fill="rgba(79,110,247,0.08)" d="M0,110 C300,80 600,140 900,105 C1100,85 1280,120 1440,105 L1440,130 L0,130 Z"/>
    </svg>
</div>

<div class="toast" id="toast">
    <i class='bx bx-check-circle'></i>
    <span id="toastMsg"></span>
</div>

<div class="container" id="container">
    <div class="form-box login">
        <form id="loginForm" novalidate>
            <div class="logo">
                <div class="logo-icon">
                    <img src="../login1/img/icon.png"alt="iocn">
                </div>
                <span class="logo-name">Code Dạo</span>
            </div>
            <h1>Đăng Nhập</h1>
            <p class="sub">Chào mừng trở lại!</p>

            <div class="input-box">
                <input type="text" placeholder="Tên đăng nhập" autocomplete="username" required>
                <i class='bx bxs-user'></i>
            </div>
            <div class="input-box">
                <input type="password" id="lPass" placeholder="Mật khẩu" autocomplete="current-password" required>
                <i class='bx bxs-lock-alt' id="tLP"></i>
            </div>

            <div class="forgot-link">
                <a href="#" title="Quên mật khẩu?">Quên mật khẩu?</a>
            </div>

            <button type="submit" class="btn">Đăng nhập</button>

            <div class="divider"><span>Hoặc đăng nhập với</span></div>

            <div class="social-icons">
                <a href="https://www.google.com.vn" class="google" target="_blank"><i class='bx bxl-google'></i></a>
                <a href="https://www.facebook.com/" class="facebook" target="_blank"><i class='bx bxl-facebook'></i></a>
                <a href="https://www.github.com/" class="github" target="_blank"><i class='bx bxl-github'></i></a>
                <a href="https://www.linkedin.com/" class="linkedin" target="_blank"><i class='bx bxl-linkedin'></i></a>
            </div>
        </form>
    </div>

    <div class="form-box register">
        <form id="registerForm" novalidate>
            <div class="logo">
                <div class="logo-icon">
                    <img src="../login1/img/icon.png"alt="iocn">
                </div>
                <span class="logo-name">Code Dạo</span>
            </div>
            <h1>Đăng Ký Mới</h1>
            <p class="sub">Tạo tài khoản miễn phí!</p>

            <div class="input-box">
                <input type="text" placeholder="Tên đăng nhập" autocomplete="username" required>
                <i class='bx bxs-user'></i>
            </div>
            <div class="input-box">
                <input type="email" placeholder="Email" autocomplete="email" required>
                <i class='bx bxs-envelope'></i>
            </div>
            <div class="input-box">
                <input type="password" id="rPass" placeholder="Mật khẩu" autocomplete="new-password" required>
                <i class='bx bxs-lock-alt' id="tRP"></i>
            </div>
            <div class="strength" id="strengthBars">
                <span></span><span></span><span></span><span></span>
            </div>

            <button type="submit" class="btn" style="margin-top:14px">Đăng ký</button>

            <div class="divider"><span>Hoặc đăng ký với</span></div>

            <div class="social-icons">
                <a href="https://www.google.com.vn" class="google"><i class='bx bxl-google'></i></a>
                <a href="https://www.facebook.com/" class="facebook"><i class='bx bxl-facebook'></i></a>
                <a href="https://www.github.com/" class="github"><i class='bx bxl-github'></i></a>
                <a href="https://www.linkedin.com/" class="linkedin"><i class='bx bxl-linkedin'></i></a>
            </div>
        </form>
    </div>

    <div class="toggle-box">
        <div class="toggle-panel toggle-left">
            <h1>Xin chào! &#128075;</h1>
            <p>Chưa có tài khoản?<br>Đăng ký ngay nhé!</p>
            <button class="btn register-btn" type="button">Đăng ký ngay</button>
        </div>
        <div class="toggle-panel toggle-right">
            <h1>Chào mừng trở lại! &#127881;</h1>
            <p>Đã có tài khoản rồi?<br>Đăng nhập để tiếp tục.</p>
            <button class="btn login-btn" type="button">Đăng Nhập</button>
        </div>
    </div>

</div>

<script src="script.js"> </script>
</body>
</html>
